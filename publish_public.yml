version: 1
source_branch: master
target_branch: gh-pages
output_dir: docs

prepare:
  staging_dir: _audit/zo_publish_prepare
  report_file: _audit/zo_publish_prepare_report.json
  generated_target: true
  special_files:
    - .nojekyll
  allowed_target_files:
    - .nojekyll

publish:
  report_schema_version: 1
  require_remote_source: true
  cleanup_after_success: true

allowlist:
  files:
    - index.html
    - search.json
    - sitemap.xml
    - robots.txt
    - .nojekyll
    - images/favicon.ico
    - assets/logo/zo_math_logo_black_on_transprentt_1024.png
    - assets/html/sidebar-layer.html
    - content/thpt/index.html
    - content/shop/index.html
    - content/support/donate.html
    - content/support/thanks.html
  globs:
    - "site_libs/**"
    - "assets/css/*.css"
    - "assets/js/*.js"
    - "assets/**/*.css"
    - "assets/**/*.js"
    - "assets/**/*.html"
    - "assets/**/*.svg"
    - "assets/**/*.png"
    - "assets/**/*.jpg"
    - "assets/**/*.jpeg"
    - "assets/**/*.woff"
    - "assets/**/*.woff2"
    - "images/**"
    - "content/about.html"
    - "content/contact.html"
    - "content/shop/**/*.html"
    - "content/support/**/*.html"
    - "content/thpt/**/*.html"
    - "content/di_tim/**/*.html"
    - "content/di_tim/*.html"
    - "content/khoa_hoc/**/*.html"
    - "content/khoa_hoc/*.html"
    - "content/kien_tao/**/*.html"
    - "content/kien_tao/*.html"
    - "content/cong_cu/**/*.html"
    - "content/cong_cu/*.html"
    - "content/vi_sao/**/*.html"
    - "content/vi_sao/*.html"
    - "content/**/*.svg"
    - "content/**/*.png"
    - "content/**/*.jpg"
    - "content/**/*.jpeg"
    - "content/**/*.pdf"
    - "content/thpt/**/assets/img/**/*.svg"
    - "figures/thpt/**/*.svg"
    - "figures/**/*.svg"
    - "figures/**/*.png"
    - "figures/**/*.jpg"
    - "figures/**/*.jpeg"

denylist:
  paths:
    - content/di_tim/di_tim_xac_suat
    - content/di_tim/di_tim_ly_luan_toan_hoc
    - content/di_tim/di_tim_toan_hoc
    - _audit
    - README
    - quy_trinh_xay_dung
    - scripts
  globs:
    - "**/.env"
    - "**/.env.*"
    - "**/.ipynb_checkpoints/**"
    - "**/__pycache__/**"
    - "**/*_cache/**"
    - "**/*.qmd"
    - "**/*.Rmd"
    - "**/*.md"
    - "**/*.tex"
    - "**/*.aux"
    - "**/*.log"
    - "**/*.fls"
    - "**/*.fdb_latexmk"
    - "**/*.synctex.gz"
    - "**/*.py"
    - "**/*.R"
    - "**/*.sh"
    - "**/*.ps1"
    - "**/*.RData"
    - "**/*.sqlite"
    - "**/*.db"
    - "**/*.pem"
    - "**/*.key"

default_max_file_size: 10485760
size_exceptions: {}

required_files:
  - index.html
  - .nojekyll
  - images/favicon.ico
  - assets/logo/zo_math_logo_black_on_transprentt_1024.png
